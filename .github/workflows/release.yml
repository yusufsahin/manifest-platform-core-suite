name: Release Gate

on:
  push:
    tags: ["v*"]

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Full test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Conformance suite
        run: python -m mpc.conformance run packages/core-conformance/fixtures

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import mpc; print(f'MPC version: {mpc.__version__}')"
